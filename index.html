<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vimno Angkasa | Digital Universe</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 900px;
            padding: 50px 30px;
            text-align: center;
            border: 1px solid #333;
            border-radius: 25px;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
        }

        .badge {
            color: #00ffff;
            letter-spacing: 3px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(40px, 10vw, 90px);
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00ffff, #ffffff, #8a2be2);
            -webkit-background-clip: text;
            color: transparent;
        }

        p {
            color: #aaa;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 25px;
            border-radius: 30px;
            border: 1px solid #00ffff;
            background: transparent;
            color: #00ffff;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 25px #00ffff;
        }

        .footer {
            margin-top: 40px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="badge">WELCOME TO MY DIGITAL UNIVERSE</div>

        <h1>VIMNO</h1>

        <p>
            Exploring technology, creativity, crypto,
            and the future of the digital world.
        </p>

        <div class="buttons">
            <button onclick="showMessage()">ENTER THE UNIVERSE</button>
            <button onclick="aboutMe()">ABOUT ME</button>
        </div>

        <div class="footer">
            © 2026 Vimno Angkasa — Built with curiosity.
        </div>

    </div>

    <script>
        function showMessage() {
            alert("Welcome to Vimno's Digital Universe 🚀");
        }

        function aboutMe() {
            alert("Still evolving. The story has just begun...");
        }
    </script>

</body>
</html>
